name: Process Raw Job Postings
on:
  push:
    paths:
      - 'src/content/raw_job_postings.txt' # Updated path

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Scraper
        run: python scripts/process_job_postings.py # Updated script name
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/jobs/*.md
          # Clear the text file in its new location
          echo "" > src/content/raw_job_postings.txt 
          git add src/content/raw_job_postings.txt
          git commit -m "auto: generate job postings from links" || echo "No changes to commit"
          git push