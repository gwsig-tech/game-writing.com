name: Process Raw Job Postings
on:
  push:
    paths:
      - 'src/data/jobs/_raw_postings.txt'

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Scraper
        run: python scripts/process_job_postings.py # Updated script name
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/jobs/*.md
          # Clear the input file so processed links aren't re-scraped
          echo -n "" > src/data/jobs/_raw_postings.txt
          git add src/data/jobs/_raw_postings.txt
          git commit -m "auto: generate job postings from links" || echo "No changes to commit"
          git push